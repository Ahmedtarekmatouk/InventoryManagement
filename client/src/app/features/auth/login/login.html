<section class="login">
  <div class="login__card">
    <h1 class="login__title">Inventory Management</h1>
    <p class="login__subtitle">Sign in with your organizational account to continue.</p>

    <button type="button" class="button button--primary login__button" [disabled]="isSigningIn()" (click)="signIn()">
      {{ isSigningIn() ? 'Signing in...' : 'Sign in with Microsoft' }}
    </button>
  </div>
</section>
